<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-label="Sergiu Ghitea — software engineer. go, terraform, authorization. Developer experience and the infra underneath.">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0d13"/>
    </linearGradient>
    <clipPath id="win">
      <rect x="8" y="8" width="884" height="284" rx="14"/>
    </clipPath>
  </defs>

  <!-- window -->
  <g clip-path="url(#win)">
    <rect x="8" y="8" width="884" height="284" fill="url(#body)"/>
    <rect x="8" y="8" width="884" height="48" fill="#1b222c"/>
    <line x1="8" y1="56" x2="892" y2="56" stroke="#30363d" stroke-width="1"/>
  </g>
  <rect x="8.5" y="8.5" width="883" height="283" rx="13.5" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- traffic lights -->
  <circle cx="40" cy="32" r="7" fill="#ff5f56"/>
  <circle cx="64" cy="32" r="7" fill="#ffbd2e"/>
  <circle cx="88" cy="32" r="7" fill="#27c93f"/>

  <text x="450" y="37" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="15" fill="#6e7681">~/sergiught</text>

  <!-- terminal body -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="21">
    <text x="44" y="100">
      <tspan fill="#2dd4bf">$</tspan><tspan fill="#c9d1d9" dx="11">whoami</tspan>
    </text>
    <text x="44" y="144">
      <tspan fill="#e6edf3" font-weight="600">software engineer</tspan><tspan fill="#6e7681" dx="14">—</tspan><tspan fill="#2dd4bf" dx="14">go</tspan><tspan fill="#6e7681" dx="9">·</tspan><tspan fill="#2dd4bf" dx="9">terraform</tspan><tspan fill="#6e7681" dx="9">·</tspan><tspan fill="#2dd4bf" dx="9">authorization</tspan>
    </text>
    <text x="44" y="188">
      <tspan fill="#2dd4bf">$</tspan><tspan fill="#c9d1d9" dx="11">focus --on</tspan>
    </text>
    <text x="44" y="232" fill="#8b949e">developer experience &amp; the infra underneath</text>
    <text x="44" y="276"><tspan fill="#2dd4bf">$</tspan></text>
    <rect x="70" y="259" width="12" height="21" fill="#2dd4bf">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
